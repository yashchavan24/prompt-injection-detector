<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { width: 320px; font-family: -apple-system, Arial, sans-serif; background: #0f1117; color: #e6e6e6; margin: 0; padding: 14px; }
  h2 { font-size: 14px; margin: 0 0 10px; }
  textarea { width: 100%; height: 80px; background: #161922; border: 1px solid #262a35; border-radius: 6px; color: #e6e6e6; padding: 8px; font-size: 13px; box-sizing: border-box; resize: vertical; }
  button { width: 100%; margin-top: 8px; background: #4a7dff; color: white; border: none; border-radius: 6px; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  button:hover { background: #3a6aef; }
  #result { margin-top: 10px; font-size: 12px; display: none; padding: 8px; border-radius: 6px; }
  #result.allow { background: #123524; color: #4ade80; display: block; }
  #result.flag { background: #3a2f0e; color: #fbbf24; display: block; }
  #result.block { background: #3a1414; color: #f87171; display: block; }
</style>
</head>
<body>
  <h2>Prompt Injection Guard</h2>
  <textarea id="inputText" placeholder="Paste any prompt to check..."></textarea>
  <button id="checkBtn">Check prompt</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
